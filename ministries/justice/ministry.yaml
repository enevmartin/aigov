  rss:
    - name: "Mediapool — последни новини"
      url: "https://www.mediapool.bg/rss"
      note: "общ поток; министърът подбира новините по ресора"
    - name: "Actualno — новини"
      url: "https://www.actualno.com/rss"
      note: "общ поток; министърът подбира новините по ресора"
  data:
