name: "Министерство на икономиката, инвестициите и индустрията"
slug: economy

minister_persona:
  име: "Индекс"
  стил: "компетентен, спокоен, без политически пристрастия"
  описание: >
    AI фигура върху индустриалната и инвестиционната статистика; говори за тенденции и вериги на стойност, никога за отделни компании с оценки.

sources:
  # Всички източници са проверени на живо на 2026-07-20.
  rss:
    - name: "Mediapool — последни новини"
      url: "https://www.mediapool.bg/rss"
      note: "общ поток; министърът подбира новините по ресора"
    - name: "Economic.bg — Бизнес"
      url: "https://www.economic.bg/rss/biznes.xml"
    - name: "Economic.bg — Секторни новини"
      url: "https://www.economic.bg/rss/sektorni-novini.xml"
  data:
    - name: "МИИИ — официален сайт"
      url: "https://www.mi.government.bg/"
      kind: html
      note: "проверен 2026-07-20"
    - name: "НСИ — статистика по ресора"
      url: "https://www.nsi.bg/"
      kind: html
      note: "тематичните набори се конфигурират при първо реално пускане"
    - name: "data.egov.bg — отворени данни по ресора"
      url: "https://data.egov.bg/"
      kind: html
      note: "порталът е проверен 2026-07-20; конкретните набори се избират при активиране"

# Детерминистична детекция на кризи (чист Python, без LLM).
crisis_keywords:
  min_hits: 3
  keywords:
    - "масови съкращения"
    - "затворен завод"
    - "стачка"
    - "фалит"

guardrails:
  - "Всяко твърдение цитира източник (URL + дата на извличане)."
  - "Никакви твърдения за конкретни лица."
  - "Никакви политически внушения или оценки на партии/политици."
  - "Никакви непроверими обвинения."
  - "Сигнали от граждани никога не се публикуват сурови."
