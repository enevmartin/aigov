# Шаблон за министерство. Копирай директорията, преименувай я на slug-а
# (напр. ministries/health/), попълни полетата и добави slug-а в config.yaml.
#
# ВАЖНО: министерствата са САМО декларации (YAML + промптове).
# Никакъв изпълним код тук — той живее в core/ и brains/.

name: "Министерство на …" # официално българско име
slug: template # трябва да съвпада с името на директорията

minister_persona:
  име: "…" # публичното име на AI министъра
  стил: "компетентен, спокоен, без политически пристрастия"
  описание: >
    Едно-две изречения: как говори този министър, какво никога не прави.

# Източници на данни. Ползват се от core/ingest (RSS) и от промптовете
# (описанията казват на мозъка какво представляват входните файлове).
sources:
  rss: [] # - name: "Медия — рубрика"
  #   url: "https://…/rss"
  data: [] # - name: "Институция — набор данни"
  #   url: "https://…"
  #   kind: csv|json|xml|html
  #   note: "какво съдържа; проверявай URL при промяна"

# Правни предпазители — задължителни за всяко министерство.
# Промптовете ги повтарят; тук са декларирани за одит.
guardrails:
  - "Всяко твърдение цитира източник (URL + дата на извличане)."
  - "Никакви твърдения за конкретни лица."
  - "Никакви политически внушения или оценки на партии/политици."
  - "Никакви непроверими обвинения."
  - "Сигнали от граждани никога не се публикуват сурови."
